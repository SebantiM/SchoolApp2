{% load static %}{% load static %}

<div class="navbar bg-base-100 shadow-sm"> 
  <div class="flex-1">
    <a href = "{% url 'home:home'%}" class="btn btn-ghost text-xl">HOME</a>
  </div>
  {% if user.is_authenticated %}
  <div class="flex gap-2 mr-4">
    <p>{{ user.role }}:{{user.username }}</p>
  </div>
  {% endif %}
  <div class="flex gap-2">
    <input type="text" placeholder="Search" class="input input-bordered w-24 md:w-auto" />
    <div class="dropdown dropdown-end">
      <div tabindex="0" role="button" class="btn btn-ghost btn-circle avatar">
        <div class="w-10 rounded-full">
          <img
            alt="Tailwind CSS Navbar component"
            src="{% static 'images/HS1.jpg' %}" />
        </div>
      </div>
      <ul
        tabindex="-1"
        class="menu menu-sm dropdown-content bg-base-100 rounded-box z-1 mt-3 w-52 p-2 shadow">
        {% if user.is_authenticated %}
        <li>
          <a class="justify-between">
            Profile
            <span class="badge">New</span>
          </a>
        </li>
        <li><a href="{% url 'account_change_password' %}">change Password</a></li>
        <li><a href="{% url 'account_email' %}"> Add an Email Address</a>  </li>
        <li><a href ="{% url 'account_logout'%}">Logout</a></li>
        {% else %}
        <li><a href ="{% url 'account_login'%}">Login</a></li>
        <li><a href ="{% url 'account_signup'%}">Signup</a></li>
        {% endif %}
      </ul>
    </div>
  </div>
</div>
